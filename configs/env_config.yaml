# ============================================================
# Global environment configuration
# All paths are relative to the project root.
# ============================================================

db_path: data/ecommerce.db
seed: 42

# Episode limits
max_episode_steps: 15        # Hard cutoff; Tasks 1-3 need 5-9, Tasks 4-5 need 9-13

# Executor safety
executor_timeout_seconds: 2.0
executor_max_rows: 10000     # Truncate runaway result sets

# Action space
n_max_actions: 32            # Flat action space; each phase uses a subset
schema_max_cols: 20          # Padded schema encoding length (columns)

# NL embedding
nl_embedding_dim: 128        # Bag-of-words vocabulary size (CountVectorizer)
nl_vocab_path: configs/nl_vocab.json   # Fitted vocabulary (generated by seed_db.py)

# Schema encoding
schema_col_feat_dim: 8       # Per-column feature vector: [4 table one-hot, 4 dtype one-hot]

# Action masking
enforce_type_safe_joins: true
enforce_nonempty_select: true
enforce_schema_col_refs: true

# Logging
log_level: INFO
